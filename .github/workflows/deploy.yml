name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull environment variables
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Inject build-time env vars
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=https://yakncmxiastulmmzodgp.supabase.co" >> .vercel/.env.production.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlha25jbXhpYXN0dWxtbXpvZGdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MDc3MjUsImV4cCI6MjA5ODA4MzcyNX0.kBf_xLbQwYHOZ7gW3ZA7C9WzLVKau0Hntud12XanPbM" >> .vercel/.env.production.local
          echo "NEXT_PUBLIC_APP_URL=https://membros.thiagocantalovo.com" >> .vercel/.env.production.local
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .vercel/.env.production.local

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output
        run: vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
